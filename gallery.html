<main class="gallery-page">

    <!-- Section 1 -->
    <section class="gallery-section">
        <button class="gallery-toggle" type="button" data-target="section1">
            <span class="toggle-symbol">+</span>
            <span class="toggle-title">Prince Live 85</span>
        </button>

        <!-- DEFAULT STATE CONTROL:
             Add class="open" here to start expanded.
             Leave it out to start closed. -->
        <div id="Prince Live 85" class="gallery-content open">
<!--            <p style="color:white; font-size:20px;">Test text inside section 1</p>-->
            <div class="gallery-grid">
                <img src="photos/gallery/p_3_orange_prince.jpg" alt="Photo 1" class="thumb" onclick="openLightbox(this)">
                <img src="photos/gallery/p_prince_con_guitarra.jpg" alt="Photo 2" class="thumb" onclick="openLightbox(this)">
