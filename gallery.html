<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <h1>Gallery</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
    </nav>
</header>

<main class="gallery-page">

    <!-- Section 1 -->
    <section class="gallery-section">
        <button class="gallery-toggle expanded" type="button">
            <span class="toggle-symbol">-</span>
            <span class="toggle-title">Title 1</span>
        </button>

        <div class="gallery-content open">
            <div class="gallery-grid">
                <img src="photos/IMG_166029.JPG" onclick="openLightbox(this)">
                <img src="photos/IMG_166030.JPG" onclick="openLightbox(this)">
                <img src="photos/IMG_166032.JPG" onclick="openLightbox(this)">
            </div>
        </div>
    </section>

    <!-- Section 2 -->
    <section class="gallery-section">
        <button class="gallery-toggle" type="button">
            <span class="toggle-symbol">+</span>
            <span class="toggle-title">Title 2</span>
        </button>

        <div class="gallery-content">
            <div class="gallery-grid">
                <img src="photos/IMG_166029.JPG" onclick="openLightbox(this)">
                <img src="photos/IMG_166030.JPG" onclick="openLightbox(this)">
                <img src="photos/IMG_166032.JPG" onclick="openLightbox(this)">
            </div>
        </div>
    </section>

</main>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" alt="Expanded photo">
</div>

<script src="js/gallery.js"></script>

</body>
</html>
